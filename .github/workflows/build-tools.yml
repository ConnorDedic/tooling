# =============================================================================
#  NIGHTLY PENTEST TOOLKIT — GitHub Actions Workflow
#
#  Triggers : nightly cron (02:00 UTC) + manual workflow_dispatch
#
#  Releases (one per arch/OS):
#    nightly-linux-x64   nightly-linux-x86
#    nightly-windows-x64 nightly-windows-x86
#
#  COMPILED TOOLS (built from source)
#    Cross-platform : nmap (C/C++), kerbrute (Go), ligolo-ng proxy+agent (Go),
#                     chisel (Go)
#    Windows-only   : SharpHound, SharpView, Rubeus, InveighZero, Snaffler,
#                     noPac (all C#/.NET), Mimikatz (C/MSVC)
#
#  SCRIPT TOOLS (no compilation — cloned/downloaded as-is)
#    PowerShell : PowerView, Inveigh.ps1, DomainPasswordSpray, LAPSToolkit
#    Python     : BloodHound.py, windapsearch, adidnsdump, enum4linux-ng,
#                 gpp-decrypt, smbmap, evil-winrm, PetitPotam,
#                 CVE-2021-1675, PKINITtools, Responder,
#                 all Impacket example scripts
#
#  FAILURE POLICY
#    Every build step has continue-on-error: true.
#    Failures are appended to build_report.md which is embedded in the
#    release body and attached as a file — nothing fails silently.
# =============================================================================

name: Nightly Pentest Toolkit Build

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual trigger"

env:
  GO_VERSION: "1.22"
  DOTNET_VERSION: "6.0.x"

jobs:

# =============================================================================
# JOB 1 — Collect all script-based tools (runs once, shared by all releases)
# =============================================================================
  collect-scripts:
    name: Collect Script-Based Tools
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Create staging directory
        run: mkdir -p staging/scripts

      # ── PowerShell ──────────────────────────────────────────────────────────
      - name: "[PowerView] Download"
        continue-on-error: true
        run: |
          curl -fsSL -o staging/scripts/PowerView.ps1 \
            "https://raw.githubusercontent.com/PowerShellMafia/PowerSploit/master/Recon/PowerView.ps1"

      - name: "[Inveigh.ps1] Download"
        continue-on-error: true
        run: |
          curl -fsSL -o staging/scripts/Inveigh.ps1 \
            "https://raw.githubusercontent.com/Kevin-Robertson/Inveigh/master/Inveigh.ps1"

      - name: "[DomainPasswordSpray] Download"
        continue-on-error: true
        run: |
          curl -fsSL -o staging/scripts/DomainPasswordSpray.ps1 \
            "https://raw.githubusercontent.com/dafthack/DomainPasswordSpray/master/DomainPasswordSpray.ps1"

      - name: "[LAPSToolkit] Download"
        continue-on-error: true
        run: |
          curl -fsSL -o staging/scripts/LAPSToolkit.ps1 \
            "https://raw.githubusercontent.com/leoloobeek/LAPSToolkit/master/LAPSToolkit.ps1"

      # ── Python / misc ────────────────────────────────────────────────────────
      - name: "[BloodHound.py] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/fox-it/BloodHound.py.git staging/scripts/BloodHound.py

      - name: "[windapsearch] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/ropnop/windapsearch.git staging/scripts/windapsearch

      - name: "[adidnsdump] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/dirkjanm/adidnsdump.git staging/scripts/adidnsdump

      - name: "[enum4linux-ng] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/cddmp/enum4linux-ng.git staging/scripts/enum4linux-ng

      - name: "[gpp-decrypt] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/t0thkr1s/gpp-decrypt.git staging/scripts/gpp-decrypt

      - name: "[smbmap] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/ShawnDEvans/smbmap.git staging/scripts/smbmap

      - name: "[evil-winrm] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/Hackplayers/evil-winrm.git staging/scripts/evil-winrm

      - name: "[PetitPotam] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/topotam/PetitPotam.git staging/scripts/PetitPotam

      - name: "[CVE-2021-1675] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/cube0x0/CVE-2021-1675.git staging/scripts/CVE-2021-1675

      - name: "[PKINITtools] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/dirkjanm/PKINITtools.git staging/scripts/PKINITtools

      - name: "[Responder] Clone"
        continue-on-error: true
        run: git clone --depth 1 https://github.com/lgandx/Responder.git staging/scripts/Responder

      - name: "[Impacket] Clone and extract examples"
        continue-on-error: true
        run: |
          git clone --depth 1 https://github.com/SecureAuthCorp/impacket.git /tmp/impacket
          mkdir -p staging/scripts/impacket
          cp -r /tmp/impacket/examples/*      staging/scripts/impacket/ 2>/dev/null || true
          cp -r /tmp/impacket/impacket        staging/scripts/impacket/lib 2>/dev/null || true
          cp    /tmp/impacket/requirements.txt staging/scripts/impacket/ 2>/dev/null || true

      - name: Upload scripts artifact
        uses: actions/upload-artifact@v4
        with:
          name: scripts
          path: staging/scripts/
          retention-days: 1

# =============================================================================
# JOB 2 — Build Linux binaries (matrix: x64 / x86)
# =============================================================================
  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: collect-scripts
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            goarch: amd64
            cc_flags: ""
            configure_host: ""
            release_tag: nightly-linux-x64
            release_name: "Nightly Linux x64"

          - arch: x86
            goarch: "386"
            cc_flags: "-m32"
            configure_host: "--host=i686-linux-gnu"
            release_tag: nightly-linux-x86
            release_name: "Nightly Linux x86"

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            gcc-multilib g++-multilib \
            libssl-dev \
            libpcap-dev \
            autoconf automake libtool \
            zip curl git
          if [ "${{ matrix.arch }}" = "x86" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update -qq
            sudo apt-get install -y libssl-dev:i386 libpcap-dev:i386
          fi

      - name: Download scripts artifact
        uses: actions/download-artifact@v4
        with:
          name: scripts
          path: staging/scripts

      - name: Prepare output dirs and build report
        run: |
          mkdir -p dist/binaries
          cat > dist/build_report.md << 'REPORT'
          # Build Report
          REPORT
          printf "# Build Report — ${{ matrix.release_name }}\n" > dist/build_report.md
          printf "Generated: %s\n\n" "$(date -u '+%Y-%m-%d %H:%M UTC')" >> dist/build_report.md
          printf "## ✅ Successful Builds\n\n" >> dist/build_report.md
          printf "## ⚠️ Failed Builds\n" >> dist/build_report.md

      # ── nmap ─────────────────────────────────────────────────────────────────
      - name: "[nmap] Clone"
        run: git clone --depth 1 https://github.com/nmap/nmap.git /tmp/nmap_src

      - name: "[nmap] Build"
        id: nmap
        continue-on-error: true
        run: |
          cd /tmp/nmap_src
          export CFLAGS="${{ matrix.cc_flags }}" CXXFLAGS="${{ matrix.cc_flags }}" LDFLAGS="${{ matrix.cc_flags }}"
          ./configure ${{ matrix.configure_host }} \
            --without-zenmap --without-nmap-update \
            --with-openssl --with-libpcap
          make -j$(nproc)
          cp nmap "$GITHUB_WORKSPACE/dist/binaries/nmap"

      - name: "[nmap] Log"
        run: |
          if [ "${{ steps.nmap.outcome }}" = "success" ]; then
            sed -i "s|## ✅ Successful Builds|## ✅ Successful Builds\n- nmap|" dist/build_report.md
          else
            sed -i "s|## ⚠️ Failed Builds|## ⚠️ Failed Builds\n- **nmap** — compile failed (check logs)|" dist/build_report.md
          fi

      # ── kerbrute ─────────────────────────────────────────────────────────────
      - name: "[kerbrute] Clone"
        run: git clone --depth 1 https://github.com/ropnop/kerbrute.git /tmp/kerbrute_src

      - name: "[kerbrute] Build"
        id: kerbrute
        continue-on-error: true
        run: |
          cd /tmp/kerbrute_src
          GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -o "$GITHUB_WORKSPACE/dist/binaries/kerbrute" .

      - name: "[kerbrute] Log"
        run: |
          if [ "${{ steps.kerbrute.outcome }}" = "success" ]; then
            sed -i "s|## ✅ Successful Builds|## ✅ Successful Builds\n- kerbrute|" dist/build_report.md
          else
            sed -i "s|## ⚠️ Failed Builds|## ⚠️ Failed Builds\n- **kerbrute** — Go build failed (check logs)|" dist/build_report.md
          fi

      # ── ligolo-ng ─────────────────────────────────────────────────────────────
      - name: "[ligolo-ng] Clone"
        run: git clone --depth 1 https://github.com/nicocha30/ligolo-ng.git /tmp/ligolo_src

      - name: "[ligolo-ng proxy] Build"
        id: ligolo_proxy
        continue-on-error: true
        run: |
          cd /tmp/ligolo_src
          GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/binaries/ligolo-proxy" ./cmd/proxy

      - name: "[ligolo-ng proxy] Log"
        run: |
          if [ "${{ steps.ligolo_proxy.outcome }}" = "success" ]; then
            sed -i "s|## ✅ Successful Builds|## ✅ Successful Builds\n- ligolo-ng (proxy)|" dist/build_report.md
          else
            sed -i "s|## ⚠️ Failed Builds|## ⚠️ Failed Builds\n- **ligolo-ng proxy** — Go build failed (check logs)|" dist/build_report.md
          fi

      - name: "[ligolo-ng agent] Build"
        id: ligolo_agent
        continue-on-error: true
        run: |
          cd /tmp/ligolo_src
          GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/binaries/ligolo-agent" ./cmd/agent

      - name: "[ligolo-ng agent] Log"
        run: |
          if [ "${{ steps.ligolo_agent.outcome }}" = "success" ]; then
            sed -i "s|## ✅ Successful Builds|## ✅ Successful Builds\n- ligolo-ng (agent)|" dist/build_report.md
          else
            sed -i "s|## ⚠️ Failed Builds|## ⚠️ Failed Builds\n- **ligolo-ng agent** — Go build failed (check logs)|" dist/build_report.md
          fi

      # ── chisel ───────────────────────────────────────────────────────────────
      - name: "[chisel] Clone"
        run: git clone --depth 1 https://github.com/jpillora/chisel.git /tmp/chisel_src

      - name: "[chisel] Build"
        id: chisel
        continue-on-error: true
        run: |
          cd /tmp/chisel_src
          GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/binaries/chisel" .

      - name: "[chisel] Log"
        run: |
          if [ "${{ steps.chisel.outcome }}" = "success" ]; then
            sed -i "s|## ✅ Successful Builds|## ✅ Successful Builds\n- chisel|" dist/build_report.md
          else
            sed -i "s|## ⚠️ Failed Builds|## ⚠️ Failed Builds\n- **chisel** — Go build failed (check logs)|" dist/build_report.md
          fi

      # ── Strip, package, release ──────────────────────────────────────────────
      - name: Strip binaries
        run: |
          find dist/binaries -maxdepth 1 -type f | while read bin; do
            strip "$bin" 2>/dev/null || true
          done

      - name: Assemble release archive
        run: |
          TAG="${{ matrix.release_tag }}"
          mkdir -p "release/${TAG}/binaries"
          cp -r dist/binaries/* "release/${TAG}/binaries/" 2>/dev/null || true
          cp -r staging/scripts "release/${TAG}/scripts"
          cp dist/build_report.md "release/${TAG}/build_report.md"
          cd release
          zip -r "../${TAG}.zip" "${TAG}/"

      - name: Upload build report artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report-${{ matrix.release_tag }}
          path: dist/build_report.md
          retention-days: 7

      - name: Read build report for release body
        id: report
        run: |
          {
            echo "body<<EOF"
            cat dist/build_report.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.release_tag }}
          name: "${{ matrix.release_name }} — $(date -u '+%Y-%m-%d')"
          body: ${{ steps.report.outputs.body }}
          files: |
            ${{ matrix.release_tag }}.zip
            dist/build_report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =============================================================================
# JOB 3 — Build Windows binaries (matrix: x64 / x86)
#   Go tools : built natively on windows-latest (GOOS=windows)
#   C# tools : dotnet build / dotnet publish
#   Mimikatz : MSBuild (MSVC)
#   nmap     : MSBuild (MSVC) — failure noted with fallback instructions
# =============================================================================
  build-windows:
    name: Build Windows ${{ matrix.arch }}
    runs-on: windows-latest
    needs: collect-scripts
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            goarch: amd64
            dotnet_rid: win-x64
            msbuild_platform: x64
            release_tag: nightly-windows-x64
            release_name: "Nightly Windows x64"

          - arch: x86
            goarch: "386"
            dotnet_rid: win-x86
            msbuild_platform: x86
            release_tag: nightly-windows-x86
            release_name: "Nightly Windows x86"

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Download scripts artifact
        uses: actions/download-artifact@v4
        with:
          name: scripts
          path: staging/scripts

      - name: Prepare output dirs and build report
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\binaries | Out-Null
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm UTC")
          Set-Content dist\build_report.md -Encoding UTF8 -Value "# Build Report - ${{ matrix.release_name }}"
          Add-Content dist\build_report.md -Encoding UTF8 -Value "Generated: $date"
          Add-Content dist\build_report.md -Encoding UTF8 -Value ""
          Add-Content dist\build_report.md -Encoding UTF8 -Value "## Successful Builds"
          Add-Content dist\build_report.md -Encoding UTF8 -Value ""
          Add-Content dist\build_report.md -Encoding UTF8 -Value "## Failed Builds"

      - name: Write report helpers script
        shell: pwsh
        run: |
          Set-Content dist\helpers.ps1 -Encoding UTF8 -Value "function Log-Success { param([string]`$tool); `$c = Get-Content dist\build_report.md -Raw -Encoding UTF8; `$c = `$c -replace '## Successful Builds', ('## Successful Builds' + [char]10 + '- ' + `$tool); `$c | Set-Content dist\build_report.md -Encoding UTF8 }"
          Add-Content dist\helpers.ps1 -Encoding UTF8 -Value "function Log-Failure { param([string]`$tool, [string]`$reason); `$c = Get-Content dist\build_report.md -Raw -Encoding UTF8; `$c = `$c -replace '## Failed Builds', ('## Failed Builds' + [char]10 + '- ' + `$tool + ' -- ' + `$reason); `$c | Set-Content dist\build_report.md -Encoding UTF8 }"

      # ── kerbrute (Go) ─────────────────────────────────────────────────────────
      - name: "[kerbrute] Clone"
        run: git clone --depth 1 https://github.com/ropnop/kerbrute.git C:\src\kerbrute

      - name: "[kerbrute] Build"
        id: kerbrute_win
        continue-on-error: true
        shell: pwsh
        run: |
          cd C:\src\kerbrute
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.goarch }}"
          go build -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\dist\binaries\kerbrute.exe" .

      - name: "[kerbrute] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.kerbrute_win.outcome }}" -eq "success") { Log-Success "kerbrute" }
          else { Log-Failure "kerbrute" "Go build failed -- check logs" }

      # ── ligolo-ng (Go) ────────────────────────────────────────────────────────
      - name: "[ligolo-ng] Clone"
        run: git clone --depth 1 https://github.com/nicocha30/ligolo-ng.git C:\src\ligolo

      - name: "[ligolo-ng proxy] Build"
        id: ligolo_proxy_win
        continue-on-error: true
        shell: pwsh
        run: |
          cd C:\src\ligolo
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.goarch }}"
          go build -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\dist\binaries\ligolo-proxy.exe" .\cmd\proxy

      - name: "[ligolo-ng proxy] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.ligolo_proxy_win.outcome }}" -eq "success") { Log-Success "ligolo-ng (proxy)" }
          else { Log-Failure "ligolo-ng proxy" "Go build failed -- check logs" }

      - name: "[ligolo-ng agent] Build"
        id: ligolo_agent_win
        continue-on-error: true
        shell: pwsh
        run: |
          cd C:\src\ligolo
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.goarch }}"
          go build -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\dist\binaries\ligolo-agent.exe" .\cmd\agent

      - name: "[ligolo-ng agent] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.ligolo_agent_win.outcome }}" -eq "success") { Log-Success "ligolo-ng (agent)" }
          else { Log-Failure "ligolo-ng agent" "Go build failed -- check logs" }

      # ── chisel (Go) ───────────────────────────────────────────────────────────
      - name: "[chisel] Clone"
        run: git clone --depth 1 https://github.com/jpillora/chisel.git C:\src\chisel

      - name: "[chisel] Build"
        id: chisel_win
        continue-on-error: true
        shell: pwsh
        run: |
          cd C:\src\chisel
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.goarch }}"
          go build -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\dist\binaries\chisel.exe" .

      - name: "[chisel] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.chisel_win.outcome }}" -eq "success") { Log-Success "chisel" }
          else { Log-Failure "chisel" "Go build failed -- check logs" }

      # ── nmap (MSVC / MSBuild) ─────────────────────────────────────────────────
      - name: "[nmap] Clone"
        run: git clone --depth 1 https://github.com/nmap/nmap.git C:\src\nmap

      - name: "[nmap] Build"
        id: nmap_win
        continue-on-error: true
        shell: pwsh
        run: |
          $sln = "C:\src\nmap\mswin32\nmap.sln"
          if (-not (Test-Path $sln)) { exit 1 }
          msbuild $sln /p:Configuration=Release /p:Platform=${{ matrix.msbuild_platform }} /m
          $exe = Get-ChildItem "C:\src\nmap" -Recurse -Filter "nmap.exe" |
                 Where-Object { $_.FullName -match "Release" } | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE\dist\binaries\nmap.exe" }
          else { exit 1 }

      - name: "[nmap] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.nmap_win.outcome }}" -eq "success") { Log-Success "nmap" }
          else { Log-Failure "nmap" "MSVC/MSBuild failed -- pre-built binaries at https://nmap.org/download.html" }

      # ── SharpHound (C#) ───────────────────────────────────────────────────────
      - name: "[SharpHound] Clone"
        run: git clone --depth 1 https://github.com/BloodHoundAD/SharpHound.git C:\src\SharpHound

      - name: "[SharpHound] Build"
        id: sharphound
        continue-on-error: true
        shell: pwsh
        run: |
          cd C:\src\SharpHound
          dotnet restore
          dotnet publish -c Release -r ${{ matrix.dotnet_rid }} `
            --self-contained true -p:PublishSingleFile=true `
            -o "$env:GITHUB_WORKSPACE\dist\binaries\sh_out"
          $exe = Get-ChildItem "$env:GITHUB_WORKSPACE\dist\binaries\sh_out" -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE\dist\binaries\SharpHound.exe"
            Remove-Item "$env:GITHUB_WORKSPACE\dist\binaries\sh_out" -Recurse -Force
          } else { exit 1 }

      - name: "[SharpHound] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.sharphound.outcome }}" -eq "success") { Log-Success "SharpHound" }
          else { Log-Failure "SharpHound" "dotnet publish failed -- check logs" }

      # ── SharpView (C#) ────────────────────────────────────────────────────────
      - name: "[SharpView] Clone"
        run: git clone --depth 1 https://github.com/dmchell/SharpView.git C:\src\SharpView

      - name: "[SharpView] Build"
        id: sharpview
        continue-on-error: true
        shell: pwsh
        run: |
          cd C:\src\SharpView
          dotnet restore
          dotnet build -c Release
          $exe = Get-ChildItem C:\src\SharpView -Recurse -Filter "SharpView.exe" |
                 Where-Object { $_.FullName -match "Release" } | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE\dist\binaries\SharpView.exe" }
          else { exit 1 }

      - name: "[SharpView] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.sharpview.outcome }}" -eq "success") { Log-Success "SharpView" }
          else { Log-Failure "SharpView" "dotnet build failed -- check logs" }

      # ── Rubeus (C#) ───────────────────────────────────────────────────────────
      - name: "[Rubeus] Clone"
        run: git clone --depth 1 https://github.com/GhostPack/Rubeus.git C:\src\Rubeus

      - name: "[Rubeus] Build"
        id: rubeus
        continue-on-error: true
        shell: pwsh
        run: |
          cd C:\src\Rubeus
          dotnet restore
          dotnet build -c Release
          $exe = Get-ChildItem C:\src\Rubeus -Recurse -Filter "Rubeus.exe" |
                 Where-Object { $_.FullName -match "Release" } | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE\dist\binaries\Rubeus.exe" }
          else { exit 1 }

      - name: "[Rubeus] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.rubeus.outcome }}" -eq "success") { Log-Success "Rubeus" }
          else { Log-Failure "Rubeus" "dotnet build failed -- check logs" }

      # ── InveighZero (C#) ──────────────────────────────────────────────────────
      - name: "[InveighZero] Clone"
        run: git clone --depth 1 https://github.com/Kevin-Robertson/Inveigh.git C:\src\Inveigh

      - name: "[InveighZero] Build"
        id: inveigh
        continue-on-error: true
        shell: pwsh
        run: |
          cd C:\src\Inveigh
          dotnet restore
          dotnet build -c Release
          $exe = Get-ChildItem C:\src\Inveigh -Recurse -Filter "Inveigh.exe" |
                 Where-Object { $_.FullName -match "Release" } | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE\dist\binaries\InveighZero.exe" }
          else { exit 1 }

      - name: "[InveighZero] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.inveigh.outcome }}" -eq "success") { Log-Success "InveighZero" }
          else { Log-Failure "InveighZero" "dotnet build failed -- check logs" }

      # ── Snaffler (C#) ─────────────────────────────────────────────────────────
      - name: "[Snaffler] Clone"
        run: git clone --depth 1 https://github.com/SnaffCon/Snaffler.git C:\src\Snaffler

      - name: "[Snaffler] Build"
        id: snaffler
        continue-on-error: true
        shell: pwsh
        run: |
          cd C:\src\Snaffler
          dotnet restore
          dotnet publish -c Release -r ${{ matrix.dotnet_rid }} `
            --self-contained true -p:PublishSingleFile=true `
            -o "$env:GITHUB_WORKSPACE\dist\binaries\sn_out"
          $exe = Get-ChildItem "$env:GITHUB_WORKSPACE\dist\binaries\sn_out" -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE\dist\binaries\Snaffler.exe"
            Remove-Item "$env:GITHUB_WORKSPACE\dist\binaries\sn_out" -Recurse -Force
          } else { exit 1 }

      - name: "[Snaffler] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.snaffler.outcome }}" -eq "success") { Log-Success "Snaffler" }
          else { Log-Failure "Snaffler" "dotnet publish failed -- check logs" }

      # ── noPac (C#) ────────────────────────────────────────────────────────────
      - name: "[noPac] Clone"
        run: git clone --depth 1 https://github.com/Ridter/noPac.git C:\src\noPac

      - name: "[noPac] Build"
        id: nopac
        continue-on-error: true
        shell: pwsh
        run: |
          cd C:\src\noPac
          dotnet restore
          dotnet build -c Release
          $exe = Get-ChildItem C:\src\noPac -Recurse -Filter "*.exe" |
                 Where-Object { $_.FullName -match "Release" } | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE\dist\binaries\noPac.exe" }
          else { exit 1 }

      - name: "[noPac] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.nopac.outcome }}" -eq "success") { Log-Success "noPac" }
          else { Log-Failure "noPac" "dotnet build failed -- check logs" }

      # ── Mimikatz (C / MSVC) ───────────────────────────────────────────────────
      - name: "[Mimikatz] Clone"
        run: git clone --depth 1 https://github.com/ParrotSec/mimikatz.git C:\src\mimikatz

      - name: "[Mimikatz] Build"
        id: mimikatz
        continue-on-error: true
        shell: pwsh
        run: |
          $sln = "C:\src\mimikatz\mimikatz.sln"
          if (-not (Test-Path $sln)) { exit 1 }
          msbuild $sln /p:Configuration=Release /p:Platform=${{ matrix.msbuild_platform }} /m
          $exe = Get-ChildItem "C:\src\mimikatz" -Recurse -Filter "mimikatz.exe" |
                 Where-Object { $_.FullName -match "Release" } | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE\dist\binaries\mimikatz.exe" }
          else { exit 1 }

      - name: "[Mimikatz] Log"
        shell: pwsh
        run: |
          . dist\helpers.ps1
          if ("${{ steps.mimikatz.outcome }}" -eq "success") { Log-Success "Mimikatz" }
          else { Log-Failure "Mimikatz" "MSVC/MSBuild failed -- check logs" }

      # ── Package and release ───────────────────────────────────────────────────
      - name: Assemble release archive
        shell: pwsh
        run: |
          $tag = "${{ matrix.release_tag }}"
          New-Item -ItemType Directory -Force -Path "release\$tag\binaries" | Out-Null
          if (Test-Path "dist\binaries") {
            Copy-Item -Path "dist\binaries\*" -Destination "release\$tag\binaries\" -Recurse -Force
          }
          if (Test-Path "staging\scripts") {
            Copy-Item -Path "staging\scripts" -Destination "release\$tag\scripts" -Recurse -Force
          }
          Copy-Item "dist\build_report.md" "release\$tag\build_report.md"
          Compress-Archive -Path "release\$tag\*" -DestinationPath "$tag.zip" -Force

      - name: Upload build report artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report-${{ matrix.release_tag }}
          path: dist/build_report.md
          retention-days: 7

      - name: Read build report for release body
        id: report
        shell: pwsh
        run: |
          $body = Get-Content dist\build_report.md -Raw -Encoding UTF8
          "body<<EOF" | Out-File -Append $env:GITHUB_OUTPUT -Encoding UTF8
          $body        | Out-File -Append $env:GITHUB_OUTPUT -Encoding UTF8
          "EOF"        | Out-File -Append $env:GITHUB_OUTPUT -Encoding UTF8

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.release_tag }}
          name: "${{ matrix.release_name }} — ${{ github.run_id }}"
          body: ${{ steps.report.outputs.body }}
          files: |
            ${{ matrix.release_tag }}.zip
            dist/build_report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =============================================================================
# JOB 4 — Workflow summary (always runs, collates all four build reports)
# =============================================================================
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    if: always()
    steps:
      - name: Download all build reports
        uses: actions/download-artifact@v4
        with:
          pattern: build-report-*
          path: all-reports
          merge-multiple: true

      - name: Write job summary
        run: |
          {
            echo "# Nightly Pentest Toolkit — Build Summary"
            echo "**Run:** \`${{ github.run_id }}\` | **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "> **Manual trigger:** ${{ github.event.inputs.reason }}"
              echo ""
            fi
            echo "## Releases Published"
            echo "| Release Tag | Compiled Binaries | Scripts |"
            echo "|---|---|---|"
            echo "| \`nightly-linux-x64\`   | nmap, kerbrute, ligolo-proxy, ligolo-agent, chisel | all |"
            echo "| \`nightly-linux-x86\`   | nmap, kerbrute, ligolo-proxy, ligolo-agent, chisel | all |"
            echo "| \`nightly-windows-x64\` | nmap, kerbrute, ligolo-proxy, ligolo-agent, chisel, SharpHound, SharpView, Rubeus, InveighZero, Snaffler, noPac, Mimikatz | all |"
            echo "| \`nightly-windows-x86\` | nmap, kerbrute, ligolo-proxy, ligolo-agent, chisel, SharpHound, SharpView, Rubeus, InveighZero, Snaffler, noPac, Mimikatz | all |"
            echo ""
            echo "## Per-Target Build Reports"
            for f in all-reports/*.md; do
              echo "---"
              cat "$f"
              echo ""
            done
          } >> "$GITHUB_STEP_SUMMARY"
