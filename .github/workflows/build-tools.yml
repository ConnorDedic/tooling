      - uses: actions/upload-artifact@v4
        with:
          name: lapstoolkit
          path: lapstoolkit.zip

  # ── windapsearch ─────────────────────────────────────────────────────────────
  windapsearch:
    runs-on: ubuntu-latest
    steps:
      - name: Clone & Package
        run: |
          git clone https://github.com/ropnop/windapsearch.git
          zip windapsearch.zip windapsearch/windapsearch.py windapsearch/requirements.txt
      - uses: actions/upload-artifact@v4
        with:
          name: windapsearch
          path: windapsearch.zip

  # ── adidnsdump ───────────────────────────────────────────────────────────────
  adidnsdump:
    runs-on: ubuntu-latest
    steps:
      - name: Install & Package
        run: |
          pip3 install adidnsdump --break-system-packages 2>/dev/null || pip3 install adidnsdump
          mkdir adidns-tools
          for DIR in ~/.local/bin /usr/local/bin /usr/bin; do
            [ -f "$DIR/adidnsdump" ] && cp "$DIR/adidnsdump" adidns-tools/ && break
          done
          zip adidnsdump.zip adidns-tools/adidnsdump
      - uses: actions/upload-artifact@v4
        with:
          name: adidnsdump
          path: adidnsdump.zip

  # ── DomainPasswordSpray ──────────────────────────────────────────────────────
  domainpasswordspray:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch & Package
        run: |
          wget -q https://raw.githubusercontent.com/dafthack/DomainPasswordSpray/master/DomainPasswordSpray.ps1
          zip domainpasswordspray.zip DomainPasswordSpray.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: domainpasswordspray
          path: domainpasswordspray.zip

  # ── PowerUpSQL ───────────────────────────────────────────────────────────────
  powerupsql:
