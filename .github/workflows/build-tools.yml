name: Download Security Tools

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download-tools:
    runs-on: windows-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Create Artifacts Folder
        run: mkdir artifacts

      - name: Download Ghostpack & Related Binaries
        run: |
          # Ghostpack tools
          curl -L -o artifacts/crackmapexec.exe https://github.com/r3motecontrol/Ghostpack-CompiledBinaries/releases/latest/download/crackmapexec.exe
          curl -L -o artifacts/mimikatz.exe https://github.com/r3motecontrol/Ghostpack-CompiledBinaries/releases/latest/download/mimikatz.exe
          curl -L -o artifacts/inveigh.exe https://github.com/r3motecontrol/Ghostpack-CompiledBinaries/releases/latest/download/inveigh.exe
          curl -L -o artifacts/snaffler.exe https://github.com/r3motecontrol/Ghostpack-CompiledBinaries/releases/latest/download/snaffler.exe
          curl -L -o artifacts/rubeus.exe https://github.com/r3motecontrol/Ghostpack-CompiledBinaries/releases/latest/download/rubeus.exe
          curl -L -o artifacts/sharphound.exe https://github.com/r3motecontrol/Ghostpack-CompiledBinaries/releases/latest/download/sharphound.exe
          curl -L -o artifacts/kerbrute.exe https://github.com/r3motecontrol/Ghostpack-CompiledBinaries/releases/latest/download/kerbrute.exe

          # External tools
          curl -L -o artifacts/nmap.zip https://nmap.org/dist/nmap-7.94-setup.exe
          curl -L -o artifacts/winrmcp.exe https://github.com/ropnop/winrmcp/releases/latest/download/winrmcp.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Security-Tools
          path: artifacts/
