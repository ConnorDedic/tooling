name: Download Red Team Toolkit

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-toolkit:
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create artifact dir
        run: mkdir artifacts

      - name: Install jq (for GitHub API parsing)
        run: choco install jq -y

      - name: Helper function (download latest release asset)
        shell: powershell
        run: |
          function Get-LatestAsset($repo, $filter, $out) {
            try {
              $api = "https://api.github.com/repos/$repo/releases/latest"
              $json = Invoke-RestMethod -Uri $api
              $asset = $json.assets | Where-Object { $_.name -match $filter } | Select-Object -First 1
              if ($asset) {
                Write-Host "Downloading $($asset.name) from $repo"
                Invoke-WebRequest $asset.browser_download_url -OutFile "artifacts\$out"
              } else {
                Write-Warning "No matching asset for $repo with filter $filter"
              }
            } catch {
              Write-Warning "Failed to download asset from $repo"
            }
          }

          # --- Ghostpack / .NET tools ---
          Get-LatestAsset "GhostPack/Rubeus" "exe" "rubeus.exe"
          Get-LatestAsset "BloodHoundAD/SharpHound" "zip" "sharphound.zip"
          Get-LatestAsset "GhostPack/Inveigh" "exe" "inveigh.exe"
          Get-LatestAsset "GhostPack/Snaffler" "exe" "snaffler.exe"

          # --- Other red team tools ---
          Get-LatestAsset "gentilkiwi/mimikatz" "zip" "mimikatz.zip"
          Get-LatestAsset "ropnop/kerbrute" "windows" "kerbrute.exe"
          Get-LatestAsset "ropnop/winrmcp" "exe" "winrmcp.exe"

          # --- CrackMapExec (Python tool, grab source) ---
          Get-LatestAsset "Porchetta-Industries/CrackMapExec" "zip" "crackmapexec.zip"

      - name: Download Nmap (official)
        run: |
          try {
            curl -L -o artifacts/nmap-setup.exe https://nmap.org/dist/nmap-7.94-setup.exe
          } catch {
            Write-Warning "Failed to download Nmap installer"
          }

      - name: Extract archives
        shell: powershell
        run: |
          Get-ChildItem artifacts\*.zip | ForEach-Object {
            try {
              Expand-Archive $_.FullName -DestinationPath artifacts\ -Force
            } catch {
              Write-Warning "Failed to extract $($_.Name)"
            }
          }

      - name: Upload Toolkit
        uses: actions/upload-artifact@v4
        with:
          name: redteam-toolkit
          path: artifacts/
