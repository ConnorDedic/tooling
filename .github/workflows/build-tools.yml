name: Build Ghostpack Tools

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        project: [crackmapexec, mimikatz, inveigh, snaffler, rubeus, sharphound, kerbrute]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build project
        run: |
          dotnet build ./tools/${{ matrix.project }}/${{ matrix.project }}.csproj -c Release --framework net462

      - name: Publish project
        run: |
          dotnet publish ./tools/${{ matrix.project }}/${{ matrix.project }}.csproj -c Release --framework net462 -o ./artifacts/${{ matrix.project }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}
          path: ./artifacts/${{ matrix.project }}
