    steps:
      - name: Clone & Package
        run: |
          git clone https://github.com/lgandx/Responder.git
          zip -r responder.zip Responder
      - uses: actions/upload-artifact@v4
        with:
          name: responder
          path: responder.zip

  # ── PKINITtools ──────────────────────────────────────────────────────────────
  pkinittools:
    runs-on: ubuntu-latest
    steps:
      - name: Clone & Package
        run: |
          git clone https://github.com/dirkjanm/PKINITtools.git
          zip -r pkinittools.zip PKINITtools
      - uses: actions/upload-artifact@v4
        with:
          name: pkinittools
          path: pkinittools.zip

  # ── noPac ────────────────────────────────────────────────────────────────────
  nopac:
    runs-on: ubuntu-latest
    steps:
      - name: Clone & Package
        run: |
          git clone https://github.com/Ridter/noPac.git
          zip -r nopac.zip noPac
      - uses: actions/upload-artifact@v4
        with:
          name: nopac
          path: nopac.zip
