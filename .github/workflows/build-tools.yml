name: Build and Release Toolkit

on:
  workflow_dispatch:   # allows manual runs
  push:
    tags:
      - 'v*'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TEMP_DIR: artifacts

jobs:
  build-toolkit:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23

      - name: Create artifacts folder
        run: mkdir $env:TEMP_DIR

      - name: Download GhostPack Tools & Extras
        run: |
          function Get-LatestAsset($repo, $filter, $out) {
              $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest" -Headers @{ "User-Agent" = "PowerShell" }
              $asset = $release.assets | Where-Object { $_.name -like "*$filter*" } | Select-Object -First 1
              if ($null -eq $asset) {
                  Write-Warning "No matching asset for $repo with filter $filter"
                  return
              }
              Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$env:TEMP_DIR\$($asset.name)"
          }

          # GhostPack tools
          Get-LatestAsset "BloodHoundAD/SharpHound" "windows_x86.zip" "SharpHound.zip"
          Get-LatestAsset "GhostPack/Rubeus" "exe" "Rubeus.exe"
          Get-LatestAsset "gentilkiwi/mimikatz" "trunk.zip" "Mimikatz.zip"
          Get-LatestAsset "ropnop/kerbrute" "windows_386.exe" "Kerbrute.exe"
          Get-LatestAsset "GhostPack/Snaffler" "exe" "Snaffler.exe"
          Get-LatestAsset "GhostPack/Inveigh" "exe" "Inveigh.exe"
          Get-LatestAsset "Porchetta-Industries/CrackMapExec" "cme-*.zip" "CME.zip"
          Get-LatestAsset "nmap/nmap" "zip" "Nmap.zip"  # If available

      - name: List downloaded artifacts
        run: Get-ChildItem $env:TEMP_DIR

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TEMP_DIR }}\*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
