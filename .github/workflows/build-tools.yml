name: Build Tools

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Build Chisel
      # -------------------------
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Clone Chisel
        run: git clone https://github.com/jpillora/chisel.git

      - name: Build Chisel
        run: |
          cd chisel
          go build -o ../dist/chisel.exe ./client
        continue-on-error: true   # <-- error handling so it won't break workflow

      # -------------------------
      # Build Rubeus
      # -------------------------
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Clone Rubeus
        run: git clone https://github.com/GhostPack/Rubeus.git

      - name: Retarget Rubeus to .NET 4.8
        run: |
          $proj = "Rubeus\Rubeus.csproj"
          (Get-Content $proj) -replace '<TargetFramework>net40</TargetFramework>', '<TargetFramework>net48</TargetFramework>' | Set-Content $proj

      - name: Build Rubeus
        run: |
          dotnet build Rubeus/Rubeus.csproj -c Release -f net48
          Copy-Item "Rubeus/bin/Release/net48/Rubeus.exe" "dist/Rubeus.exe"
        continue-on-error: true   # <-- ensures workflow continues if Rubeus fails

      # -------------------------
      # Package Artifacts
      # -------------------------
      - name: Create dist folder
        run: mkdir dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-tools
          path: dist/
