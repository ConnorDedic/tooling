name: Nightly Tool Build & Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

env:
  NMAP_VERSION: "7.94"

jobs:

  kerbrute:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Clone
        run: git clone https://github.com/ropnop/kerbrute.git

      - name: Build (x86 Windows + Linux)
        run: |
          cd kerbrute

          GOARCH=386 GOOS=windows go build -o kerbrute.exe
          GOARCH=386 GOOS=linux go build -o kerbrute

          zip kerbrute-windows-x86.zip kerbrute.exe
          zip kerbrute-linux-x86.zip kerbrute

      - uses: actions/upload-artifact@v4
        with:
          name: kerbrute
          path: "*.zip"

  sharphound:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - run: git clone https://github.com/BloodHoundAD/SharpHound.git

      - name: Build dynamically (x86 only)
        run: |
          cd SharpHound
          PROJECT=$(find . -name "*.csproj" | head -n 1)
          FRAMEWORK=$(grep -oPm1 "(?<=<TargetFramework>)[^<]+" "$PROJECT")

          dotnet restore "$PROJECT"

          for RID in win-x86 linux-x86; do
            dotnet publish "$PROJECT" \
              -c Release \
              -f "$FRAMEWORK" \
              -r $RID \
              --self-contained true \
              -p:PublishSingleFile=true \
              -o out/$RID
          done

          cd out
          zip -r ../../sharphound-windows-x86.zip win-x86
          zip -r ../../sharphound-linux-x86.zip linux-x86

      - uses: actions/upload-artifact@v4
        with:
          name: sharphound
          path: "*.zip"

  mimikatz:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - run: git clone https://github.com/gentilkiwi/mimikatz.git

      - uses: microsoft/setup-msbuild@v2

      - name: Build x86
        shell: cmd
        run: |
          cd mimikatz
          call "%ProgramFiles(x86)%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          msbuild mimikatz.sln /p:Configuration=Release /p:Platform=Win32 /m

      - run: |
          cd mimikatz
          copy x86\mimikatz.exe mimikatz.exe
          powershell Compress-Archive mimikatz.exe mimikatz-windows-x86.zip

      - uses: actions/upload-artifact@v4
        with:
          name: mimikatz
          path: mimikatz-windows-x86.zip

  netcat:
    runs-on: ubuntu-latest
    steps:
      - name: Install netcat
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y netcat-traditional

      - name: Package (Linux + Windows via prebuilt)
        run: |
          cp /bin/nc netcat
          zip netcat-linux-x86.zip netcat

          # Windows prebuilt fallback (stable)
          wget -q https://eternallybored.org/misc/netcat/netcat-win32-1.12.zip
          unzip -q netcat-win32-1.12.zip
          zip netcat-windows-x86.zip nc.exe

      - uses: actions/upload-artifact@v4
        with:
          name: netcat
          path: "*.zip"

  nmap:
    runs-on: ubuntu-latest
    steps:
      - name: Linux build (x86)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y gcc-multilib make libpcap-dev

          wget -q https://nmap.org/dist/nmap-${{ env.NMAP_VERSION }}.tar.bz2
          tar -xjf nmap-${{ env.NMAP_VERSION }}.tar.bz2
          cd nmap-${{ env.NMAP_VERSION }}

          ./configure --host=i686-linux-gnu
          make -j$(nproc)

          zip ../nmap-linux-x86.zip nmap

      - name: Windows prebuilt
        run: |
          wget -q https://nmap.org/dist/nmap-${{ env.NMAP_VERSION }}-win32.zip -O nmap-win.zip
          unzip -q nmap-win.zip

          DIR=$(find . -maxdepth 1 -type d -name "nmap-*" | head -n 1)

          zip nmap-windows-x86.zip "$DIR/nmap.exe" "$DIR/ncat.exe" || true

      - uses: actions/upload-artifact@v4
        with:
          name: nmap
          path: "*.zip"
