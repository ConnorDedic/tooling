name: Nightly Pentest Toolkit Build

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual trigger"

# 🔥 REQUIRED — fixes "Resource not accessible by integration"
permissions:
  contents: write

env:
  GO_VERSION: "1.22"
  DOTNET_VERSION: "6.0.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# =============================================================================
# SCRIPT COLLECTION (unchanged)
# =============================================================================
  collect-scripts:
    name: Collect Script-Based Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: mkdir -p staging/scripts

      - run: curl -fsSL -o staging/scripts/PowerView.ps1 https://raw.githubusercontent.com/PowerShellMafia/PowerSploit/master/Recon/PowerView.ps1
        continue-on-error: true

      - run: git clone --depth 1 https://github.com/fox-it/BloodHound.py.git staging/scripts/BloodHound.py
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: scripts
          path: staging/scripts/
          retention-days: 1

# =============================================================================
# LINUX BUILD (only key fixes shown)
# =============================================================================
  build-linux:
    runs-on: ubuntu-latest
    needs: collect-scripts
    strategy:
      matrix:
        arch: [amd64, 386]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false   # ✅ fixes go.sum warning

      - uses: actions/download-artifact@v4
        with:
          name: scripts
          path: staging/scripts

      - run: mkdir -p dist/binaries

      - name: Build kerbrute
        run: |
          git clone --depth 1 https://github.com/ropnop/kerbrute.git
          cd kerbrute
          GOOS=linux GOARCH=${{ matrix.arch }} go build -o ../dist/binaries/kerbrute
        continue-on-error: true

      - name: Package
        run: |
          mkdir -p release
          zip -r nightly-linux-${{ matrix.arch }}.zip dist staging

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-linux-${{ matrix.arch }}
          files: nightly-linux-${{ matrix.arch }}.zip
          overwrite: true   # ✅ prevents collisions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =============================================================================
# WINDOWS BUILD (FIXED .NET)
# =============================================================================
  build-windows:
    runs-on: windows-latest
    needs: collect-scripts
    strategy:
      matrix:
        arch:
          - goarch: amd64
            rid: win-x64
          - goarch: 386
            rid: win-x86

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: scripts
          path: staging/scripts

      - run: mkdir dist

      # ✅ GO BUILD (unchanged)
      - name: Build chisel
        shell: pwsh
        run: |
          git clone https://github.com/jpillora/chisel.git
          cd chisel
          $env:GOOS="windows"
          $env:GOARCH="${{ matrix.arch.goarch }}"
          go build -o ../dist/chisel.exe

      # 🔥 FIXED .NET BUILDS (NO SINGLE FILE)
      - name: Build Rubeus
        shell: pwsh
        run: |
          git clone https://github.com/GhostPack/Rubeus.git
          cd Rubeus
          dotnet restore
          dotnet build -c Release
          $exe = Get-ChildItem -Recurse -Filter Rubeus.exe | Select-Object -First 1
          Copy-Item $exe.FullName ../dist/Rubeus.exe

      - name: Build SharpHound
        shell: pwsh
        run: |
          git clone https://github.com/BloodHoundAD/SharpHound.git
          cd SharpHound
          dotnet restore
          dotnet build -c Release   # ✅ FIX
          $exe = Get-ChildItem -Recurse -Filter *.exe | Select-Object -First 1
          Copy-Item $exe.FullName ../dist/SharpHound.exe

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path dist,staging -DestinationPath nightly-windows.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-windows-${{ matrix.arch.goarch }}
          files: nightly-windows.zip
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
