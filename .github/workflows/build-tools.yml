name: Build Toolkit Release

on:
  push:
    tags:
      - 'v*'  # Only trigger on version tags like v1.0, v2.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARTIFACTS_DIR: artifacts

jobs:
  build-toolkit:
    runs-on: windows-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2️⃣ Create artifacts folder
      - name: Prepare Artifacts Folder
        run: |
          if (!(Test-Path $Env:ARTIFACTS_DIR)) { New-Item -ItemType Directory -Path $Env:ARTIFACTS_DIR }

      # 3️⃣ Download Ghostpack + other tools
      - name: Download Tools
        shell: pwsh
        run: |
          function Get-LatestAsset($repo, $filter, $out) {
              $releases = gh release list -R $repo --limit 1 --json tagName,assets
              if ($releases.Count -eq 0) { Write-Warning "No releases found for $repo"; return }
              $release = $releases[0]
              $asset = $release.assets | Where-Object { $_.name -like "*$filter*" } | Select-Object -First 1
              if ($null -eq $asset) { Write-Warning "No matching asset for $repo with filter $filter"; return }
              gh release download $release.tagName -R $repo -p $asset.name -D $Env:ARTIFACTS_DIR
          }

          # Ghostpack tools
          Get-LatestAsset "GhostPack/Rubeus" "zip" "rubeus.zip"
          Get-LatestAsset "BloodHoundAD/SharpHound" "zip" "sharphound.zip"
          Get-LatestAsset "GhostPack/Inveigh" "zip" "inveigh.zip"
          Get-LatestAsset "GhostPack/Snaffler" "zip" "snaffler.zip"

          # Mimikatz
          Get-LatestAsset "gentilkiwi/mimikatz" "zip" "mimikatz.zip"

          # Kerbrute
          Get-LatestAsset "ropnop/kerbrute" "windows_386" "kerbrute.exe"

          # CrackMapExec (Windows)
          Get-LatestAsset "Porchetta-Industries/CrackMapExec" "windows" "cme.zip"

          # Nmap (direct download fallback if not in GH)
          $nmapUrl = "https://nmap.org/dist/nmap-7.94-setup.exe"
          Invoke-WebRequest $nmapUrl -OutFile "$Env:ARTIFACTS_DIR\nmap-7.94-setup.exe"

      # 4️⃣ Create a single combined zip
      - name: Package Toolkit
        shell: pwsh
        run: |
          Compress-Archive -Path "$Env:ARTIFACTS_DIR\*" -DestinationPath "$Env:ARTIFACTS_DIR\Toolkit-$GITHUB_REF_NAME.zip" -Force

      # 5️⃣ Create GitHub Release and upload artifacts
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: "$Env:ARTIFACTS_DIR\Toolkit-$GITHUB_REF_NAME.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
