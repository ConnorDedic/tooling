name: Nightly Pentest Toolkit Build

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: "1.22"
  DOTNET_VERSION: "6.0.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# =============================================================================
# COLLECT SCRIPTS
# =============================================================================
  collect-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: mkdir -p staging/scripts

      - run: curl -fsSL -o staging/scripts/PowerView.ps1 https://raw.githubusercontent.com/PowerShellMafia/PowerSploit/master/Recon/PowerView.ps1
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: scripts
          path: staging/scripts/
          retention-days: 1

# =============================================================================
# LINUX BUILD
# =============================================================================
  build-linux:
    runs-on: ubuntu-latest
    needs: collect-scripts
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, 386]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - uses: actions/download-artifact@v4
        with:
          name: scripts
          path: staging/scripts

      - run: mkdir -p dist staging

      - name: Build kerbrute
        run: |
          git clone --depth 1 https://github.com/ropnop/kerbrute.git
          cd kerbrute
          GOOS=linux GOARCH=${{ matrix.arch }} go build -o ../dist/kerbrute
        continue-on-error: true

      - name: Package
        run: |
          zip -r nightly-linux-${{ matrix.arch }}.zip dist staging

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-linux-${{ matrix.arch }}
          files: nightly-linux-${{ matrix.arch }}.zip
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =============================================================================
# WINDOWS BUILD
# =============================================================================
  build-windows:
    runs-on: windows-latest
    needs: collect-scripts
    strategy:
      fail-fast: false
      matrix:
        arch:
          - goarch: amd64
          - goarch: 386

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install .NET Framework Dev Pack
        shell: pwsh
        run: choco install netfx-4.8-devpack -y

      - uses: actions/download-artifact@v4
        with:
          name: scripts
          path: staging/scripts

      - name: Prepare dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path staging | Out-Null

      # -----------------------------------------------------------------------------
      # GO TOOL
      # -----------------------------------------------------------------------------
      - name: Build chisel
        shell: pwsh
        run: |
          git clone https://github.com/jpillora/chisel.git
          cd chisel
          $env:GOOS="windows"
          $env:GOARCH="${{ matrix.arch.goarch }}"
          go build -o ../dist/chisel.exe

      # -----------------------------------------------------------------------------
      # RUBEUS (BUILD OR FALLBACK)
      # -----------------------------------------------------------------------------
      - name: Build or Fallback Rubeus
        shell: pwsh
        run: |
          $buildSucceeded = $false
          try {
              git clone https://github.com/GhostPack/Rubeus.git
              cd Rubeus\Rubeus

              Write-Host "Attempting to build Rubeus..."
              if (Get-Command msbuild -ErrorAction SilentlyContinue) {
                  msbuild Rubeus.csproj /p:Configuration=Release -ErrorAction Stop
                  $exe = Get-ChildItem -Recurse -Filter Rubeus.exe | Select-Object -First 1
                  if ($exe) {
                      Copy-Item $exe.FullName ../../dist/Rubeus.exe
                      Write-Host "Rubeus built successfully."
                      $buildSucceeded = $true
                  }
              } else {
                  Write-Warning "MSBuild not found; skipping build."
              }
          } catch {
              Write-Warning "Rubeus build failed: $_"
          }

          if (-not $buildSucceeded) {
              Write-Warning "Rubeus not built. Using repository fallback..."
              # Fallback: copy from a stored artifact in repo if available
              if (Test-Path "./fallback/Rubeus.exe") {
                  Copy-Item "./fallback/Rubeus.exe" "../../dist/Rubeus.exe"
                  Write-Host "Rubeus copied from fallback."
                  $buildSucceeded = $true
              } else {
                  Write-Warning "No fallback Rubeus available. Workflow continues without it."
              }
          }

      # -----------------------------------------------------------------------------
      # SHARPHOUND
      # -----------------------------------------------------------------------------
      - name: Build SharpHound
        shell: pwsh
        run: |
          git clone https://github.com/BloodHoundAD/SharpHound.git
          cd SharpHound

          dotnet build -c Release

          $exe = Get-ChildItem -Recurse -Filter *.exe | Select-Object -First 1
          if ($exe) {
              Copy-Item $exe.FullName ../dist/SharpHound.exe
          } else {
              Write-Warning "SharpHound.exe not found, continuing workflow."
          }

      # -----------------------------------------------------------------------------
      # PACKAGE
      # -----------------------------------------------------------------------------
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path dist,staging -DestinationPath nightly-windows-${{ matrix.arch.goarch }}.zip

      # -----------------------------------------------------------------------------
      # RELEASE
      # -----------------------------------------------------------------------------
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-windows-${{ matrix.arch.goarch }}
          files: nightly-windows-${{ matrix.arch.goarch }}.zip
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
