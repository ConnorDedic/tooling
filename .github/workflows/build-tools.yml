name: Nightly Tool Build & Release
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

env:
  NMAP_VERSION: "7.94"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ── kerbrute ────────────────────────────────────────────────────────────────
  kerbrute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: false
      - name: Clone & Build
        run: |
          git clone https://github.com/ropnop/kerbrute.git
          cd kerbrute
          GOARCH=386 GOOS=windows go build -o kerbrute.exe
          GOARCH=386 GOOS=linux   go build -o kerbrute_linux
          zip ../kerbrute-windows-x86.zip kerbrute.exe
          zip ../kerbrute-linux-x86.zip kerbrute_linux
      - uses: actions/upload-artifact@v4
        with:
          name: kerbrute
          path: |
            *.zip

  # ── sharphound ─────────────────────────────────────────────────────────────
  sharphound:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Clone & Build
        shell: pwsh
        run: |
          git clone https://github.com/SpecterOps/SharpHound.git
          cd SharpHound
          $proj = Get-ChildItem -Recurse -Filter "*.csproj" | Select-Object -First 1
          $projContent = Get-Content $proj.FullName -Raw
          if ($projContent -match '<TargetFramework>(.+?)</TargetFramework>') {
              $framework = $Matches[1]
          } elseif ($projContent -match '<TargetFrameworks>(.+?)</TargetFrameworks>') {
              $framework = $Matches[1].Split(';')[0]
          } else {
              $framework = "net462"
          }
          Write-Host "Detected framework: $framework"
          dotnet restore $proj.FullName
          if ($framework -like "net4*") {
              msbuild $proj.FullName /p:Configuration=Release /p:Platform="AnyCPU" /m
              $outDir = Get-ChildItem -Path $proj.DirectoryName -Recurse -Directory | Where-Object { $_.FullName -match "bin\\Release" } | Sort-Object FullName -Descending | Select-Object -First 1
              Compress-Archive "$($outDir.FullName)\*" ..\..\sharphound-windows.zip
          } else {
              dotnet publish $proj.FullName -c Release -f $framework -r win-x64 --self-contained true -o out\win
              Compress-Archive out\win\* ..\..\sharphound-windows.zip
          }
      - uses: actions/upload-artifact@v4
        with:
          name: sharphound
          path: |
            *.zip

  # ── mimikatz ───────────────────────────────────────────────────────────────
  mimikatz:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Clone & Build
        shell: pwsh
        run: |
          git clone https://github.com/gentilkiwi/mimikatz.git
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          Write-Host "VS path: $vsPath"
          $vcvars = "$vsPath\VC\Auxiliary\Build\vcvars32.bat"
          cmd /c "`"$vcvars`" && msbuild mimikatz\mimikatz.sln /p:Configuration=Release /p:Platform=Win32 /m"
      - name: Package
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path mimikatz -Recurse -Filter mimikatz.exe | Select-Object -First 1
          if (-not $exe) { throw "mimikatz.exe not found" }
          Copy-Item $exe.FullName mimikatz.exe
          Compress-Archive mimikatz.exe mimikatz-windows-x86.zip
      - uses: actions/upload-artifact@v4
        with:
          name: mimikatz
          path: |
            mimikatz-windows-x86.zip

  # ── rubeus ────────────────────────────────────────────────────────────────
