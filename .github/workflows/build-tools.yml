  # ── snaffler ───────────────────────────────────────────────────────────────
  snaffler:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Clone & Build
        shell: pwsh
        run: |
          git clone https://github.com/SnaffCon/Snaffler.git
          cd Snaffler
          $proj = Get-ChildItem -Recurse -Filter "*.csproj" | Where-Object { $_.Name -notmatch "[Tt]est" } | Select-Object -First 1
          $projContent = Get-Content $proj.FullName -Raw
          if ($projContent -match '<TargetFramework>(.+?)</TargetFramework>') {
              $framework = $Matches[1]
          } elseif ($projContent -match '<TargetFrameworks>(.+?)</TargetFrameworks>') {
              $framework = $Matches[1].Split(';')[0]
          } else {
              $framework = "net462"
          }
          Write-Host "Framework: $framework"
          dotnet restore $proj.FullName
          if ($framework -like "net4*") {
              msbuild $proj.FullName /p:Configuration=Release /p:Platform="AnyCPU" /m
              $outDir = Get-ChildItem -Path $proj.DirectoryName -Recurse -Directory | Where-Object { $_.FullName -match "bin\\Release" } | Sort-Object FullName -Descending | Select-Object -First 1
              Compress-Archive "$($outDir.FullName)\*.exe" ..\..\snaffler-windows.zip
          } else {
              dotnet publish $proj.FullName -c Release -r win-x64 --self-contained true -o out\win
              Compress-Archive out\win\* ..\..\snaffler-windows.zip
          }
      - uses: actions/upload-artifact@v4
        with:
          name: snaffler
          path: |
            *.zip

  # ── crackmapexec / netexec ──────────────────────────────────────────────────
  crackmapexec:
    runs-on: ubuntu-latest
    steps:
      - name: Install NetExec & Package
        run: |
          python3 -m pip install --user pipx
          python3 -m pipx ensurepath
          export PATH=$HOME/.local/bin:$PATH
          pipx install netexec --force
          mkdir cme-tools
          cp ~/.local/bin/netexec cme-tools/ || true
          cp ~/.local/bin/nxc cme-tools/ || true
          cp ~/.local/bin/crackmapexec cme-tools/ || true
          zip -r crackmapexec-linux.zip cme-tools
      - uses: actions/upload-artifact@v4
        with:
          name: crackmapexec
          path: |
            crackmapexec-linux.zip
